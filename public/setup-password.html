<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード設定（本登録） - りんごのまち・いいづな 管理画面</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #FFF5F5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border-top: 6px solid #d32f2f;
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-title {
            color: #d32f2f;
            font-weight: bold;
            font-size: 1.5rem;
            line-height: 1.4;
        }

        .btn-brand {
            background-color: #d32f2f;
            color: white;
            font-weight: bold;
        }

        .btn-brand:hover {
            background-color: #b71c1c;
            color: white;
        }

        .success-pane {
            display: none;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="brand-logo">
            <h1 class="brand-title">🍎 りんごのまち・いいづな<br><small class="text-muted"
                    style="font-size: 0.9rem; margin-top: 5px; display:inline-block;">パスワード設定（本登録）</small></h1>
        </div>

        <form id="setupForm">
            <div class="alert alert-info py-2" style="font-size: 0.85rem;">
                <i class="fa-solid fa-lock me-1"></i>
                ご本人確認が完了しました。今後のログインで使用するパスワードを設定してください。
            </div>

            <div id="errorMsg" class="alert alert-danger d-none py-2" style="font-size: 0.9rem;" role="alert"></div>

            <div class="mb-3">
                <label for="new_password" class="form-label text-muted fw-bold">新しいパスワード</label>
                <input type="password" class="form-control form-control-lg bg-light" id="new_password" required minlength="8"
                    placeholder="8文字以上の英数字">
            </div>

            <div class="mb-4">
                <label for="new_password_confirm" class="form-label text-muted fw-bold">新しいパスワード（確認用）</label>
                <input type="password" class="form-control form-control-lg bg-light" id="new_password_confirm" required minlength="8"
                    placeholder="もう一度入力してください">
            </div>

            <button type="submit" class="btn btn-brand w-100 py-3 fs-5 rounded-3 mb-3"><i class="fa-solid fa-check me-2"></i>設定して本登録を完了する</button>
        </form>

        <div id="successPane" class="success-pane">
            <i class="fa-solid fa-circle-check text-success" style="font-size: 4rem; margin-bottom: 20px;"></i>
            <h4 class="fw-bold mb-3">本登録が完了しました！</h4>
            <p class="text-muted small mb-4 text-start">
                パスワードの設定が完了し、事業者としてのアカウントを有効化しました。<br>
                さっそくログイン画面から管理ダッシュボードへお進みください。
            </p>
            <a href="/login.html" class="btn btn-brand w-100 py-3 fs-5 rounded-3"><i class="fa-solid fa-right-to-bracket me-2"></i> ログイン画面へ</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('setupForm').style.display = 'none';
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = '認証URLが無効です。メールのリンクが正しいか確認してください。';
            errorMsg.classList.remove('d-none');
        }

        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new_password').value;
            const newPasswordConfirm = document.getElementById('new_password_confirm').value;
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.querySelector('button[type="submit"]');

            if (newPassword !== newPasswordConfirm) {
                errorMsg.textContent = 'パスワードが一致しません。';
                errorMsg.classList.remove('d-none');
                return;
            }

            if (newPassword.length < 8) {
                errorMsg.textContent = 'パスワードは8文字以上で入力してください。';
                errorMsg.classList.remove('d-none');
                return;
            }

            errorMsg.classList.add('d-none');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 処理中...';

            try {
                const res = await fetch('/api/auth/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: newPassword, new_password_confirm: newPasswordConfirm })
                });

                const data = await res.json();

                if (res.ok && data.ok) {
                    document.getElementById('setupForm').style.display = 'none';
                    document.getElementById('successPane').style.display = 'block';
                } else {
                    errorMsg.textContent = data.error || '登録処理に失敗しました。URLの期限が切れている可能性があります。';
                    errorMsg.classList.remove('d-none');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fa-solid fa-check me-2"></i> 設定して本登録を完了する';
                }
            } catch (err) {
                errorMsg.textContent = '通信エラーが発生しました。';
                errorMsg.classList.remove('d-none');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-check me-2"></i> 設定して本登録を完了する';
            }
        });
    </script>
</body>
</html>
