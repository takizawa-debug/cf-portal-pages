<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - りんごのまち・いいづな 管理画面</title>

    <!-- Peraichi Base Styles & Fonts -->
    <link href="//assets.peraichi.com/template_root/v2/template_files/css/style.css?1772770402" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://s3-ap-northeast-1.amazonaws.com/s3.peraichi.com/pageCustomStylesheets/2300389/themeColor_1762752043.css">
    <script src="//webfont.fontplus.jp/accessor/script/fontplus.js?5qoPx6QyJ8k%3D&aa=1" charset="utf-8"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #FFF5F5;
            /* subtle red/pink background */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border-top: 5px solid #d32f2f;
            /* Apple Red */
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-title {
            color: #d32f2f;
            font-weight: bold;
            font-size: 1.3rem;
        }

        .btn-brand {
            background-color: #d32f2f;
            color: white;
            font-weight: bold;
        }

        .btn-brand:hover {
            background-color: #b71c1c;
            color: white;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="brand-logo">
            <h1 class="brand-title">🍎 りんごのまち・いいづな<br><small class="text-muted"
                    style="font-size: 0.9rem; margin-top: 5px; display:inline-block;">管理ダッシュボード</small></h1>
        </div>

        <form id="loginForm">
            <div id="errorMsg" class="alert alert-danger d-none" role="alert"></div>

            <div class="mb-3">
                <label for="username" class="form-label text-muted fw-bold">ユーザーID</label>
                <input type="text" class="form-control" id="username" required placeholder="admin">
            </div>

            <div class="mb-4">
                <label for="password" class="form-label text-muted fw-bold">パスワード</label>
                <input type="password" class="form-control" id="password" required placeholder="password123">
            </div>

            <button type="submit" class="btn btn-brand w-100 py-2">ログイン</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.querySelector('button[type="submit"]');

            errorMsg.classList.add('d-none');
            submitBtn.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok && data.ok) {
                    localStorage.setItem('admin_role', data.user.role);
                    localStorage.setItem('admin_username', data.user.username);
                    localStorage.setItem('admin_id', data.user.id);
                    window.location.href = '/admin.html';
                } else {
                    errorMsg.textContent = data.error || 'ログインに失敗しました。';
                    errorMsg.classList.remove('d-none');
                }
            } catch (err) {
                errorMsg.textContent = '通信エラーが発生しました。';
                errorMsg.classList.remove('d-none');
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
