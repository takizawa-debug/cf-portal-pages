<!DOCTYPE html>
<html lang="ja" class="lz-loading-lock">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>【公式】りんごのまち・いいづな (テスト版)</title>
    <!-- Basic Meta Data -->
    <meta name="description" content="長野県飯綱町産のりんごポータルサイト。">

    <style>
        /* 画面読み込み時のちらつき防止 */
        html {
            background: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        body.is-ready {
            opacity: 1;
        }

        /* コンテナの幅設定 */
        .content-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }
    </style>

    <!-- UI Components Scripts (Copied from Old Design) -->
    <!-- 1. Config First -->
    <script src="/js/config.js"></script>
    <!-- 2. Common Utils -->
    <script src="/js/common.js"></script>

</head>

<body>

    <!-- 1. Top Slideshow Plugin Placeholder -->
    <!-- Images will be injected here. Note: data-images needs to contain an array of fallback images for the background -->
    <div id="lz-slideshow-app" data-text-ja="飯綱町産りんご\nポータルサイト" data-text-en="Iizuna Apple\nPortal Site"
        data-text-zh="飯綱町蘋果\n入口網站" data-images='[
             "https://s3-ap-northeast-1.amazonaws.com/s3.peraichi.com/userData/cadd36d5-015f-4440-aa3c-b426c32c22a0/img/ce71edc0-3ba5-013e-108a-0a00fe66f0ee/%E3%81%8A%E7%9F%A5%E3%82%89%E3%81%9B%E6%9C%AA%E5%AE%9A.png",
             "https://s3-ap-northeast-1.amazonaws.com/s3.peraichi.com/userData/cadd36d5-015f-4440-aa3c-b426c32c22a0/img/cf23bfe0-3ba5-013e-108a-0a00fe66f0ee/%E5%A4%A7%E5%AD%A6%E9%80%A3%E6%90%BA%E7%A9%BA.png"
         ]'>
    </div>

    <!-- 2. Info Intro Block Plugin Placeholder -->
    <!-- This populates the "Welcome to Appletown Iizuna" and 5 circular images -->
    <div id="lz-intro-block"></div>

    <!-- 3. Dynamic Sections -->
    <div class="content-wrap" style="margin-top: 60px; margin-bottom: 60px;">
        <!-- Discover (知る) -->
        <div class="lz-container" data-l1="知る"></div>
        <div class="lz-section" data-l1="知る" data-l2="飯綱町について"></div>
        <div class="lz-section" data-l1="知る" data-l2="いいづなりんごの特徴"></div>

        <!-- Savor (味わう) -->
        <div class="lz-container" data-l1="味わう"></div>
        <div class="lz-section" data-l1="味わう" data-l2="直売所・飲食店"></div>

        <!-- Experience (体験する) -->
        <div class="lz-container" data-l1="体験する"></div>
        <div class="lz-section" data-l1="体験する" data-l2="りんご狩り・体験"></div>

        <!-- Manage (営む) -->
        <div class="lz-container" data-l1="営む"></div>
        <div class="lz-section" data-l1="営む" data-l2="移住・就農支援"></div>
    </div>


    <!-- Base UI Components -->
    <script src="/js/slideshow.js"></script>
    <script src="/js/intro-block.js"></script>
    <script src="/js/section.js"></script>
    <script src="/js/modal.js"></script>

    <!-- Header & Footer Components -->
    <!-- These will automatically inject their own HTML to the body based on config.js paths -->
    <script src="/js/header.js"></script>
    <script src="/js/footer.js"></script>

    <script>
        // Reveal body after scripts initialized
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.body.classList.add('is-ready');
            }, 500);
        });
    </script>
</body>

</html>
