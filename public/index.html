<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Nexus • Information Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030712;
            --text-main: #F9FAFB;
            --text-secondary: #9CA3AF;
            --accent: #3B82F6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --card-bg: rgba(17, 24, 39, 0.7);
            --card-border: rgba(255, 255, 255, 0.05);
            --category-l1: rgba(59, 130, 246, 0.2);
            --category-l2: rgba(16, 185, 129, 0.2);
            --category-l3: rgba(139, 92, 246, 0.2);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            filter: blur(100px);
            opacity: 0.4;
            animation: float 25s infinite ease-in-out alternate;
        }

        .shape-1 {
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            width: 50vw;
            height: 50vw;
            top: -20%;
            left: -10%;
            border-radius: 50%;
        }

        .shape-2 {
            background: linear-gradient(135deg, #EC4899, #F43F5E);
            width: 40vw;
            height: 40vw;
            bottom: -10%;
            right: -10%;
            border-radius: 50%;
            animation-delay: -10s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 5rem;
            animation: fadeInDown 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            margin: 0;
            text-align: center;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #FFFFFF, #9CA3AF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-top: 1rem;
            text-align: center;
            font-weight: 300;
        }

        /* Language Switcher */
        .lang-switcher {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--card-border);
            border-radius: 99px;
            padding: 0.5rem;
            margin-top: 3rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .lang-btn {
            background: transparent;
            color: var(--text-secondary);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 99px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lang-btn.active {
            background: var(--text-main);
            color: var(--bg-color);
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.15);
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2.5rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s ease;
            display: flex;
            flex-direction: column;
            opacity: 0;
            animation: fadeInUp 0.8s forwards;
            height: 100%;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .card-img-wrapper {
            position: relative;
            width: 100%;
            height: 220px;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background-color: #1F2937;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover .card-img {
            transform: scale(1.05);
        }

        .card-badges {
            position: absolute;
            top: 1rem;
            left: 1rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .badge.l1 {
            background: var(--category-l1);
        }

        .badge.l2 {
            background: var(--category-l2);
        }

        .badge.l3 {
            background: var(--category-l3);
        }

        .card-content {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .card-title {
            font-size: 1.5rem;
            margin: 0 0 1rem 0;
            font-weight: 700;
            line-height: 1.3;
        }

        .card-lead {
            color: var(--text-main);
            font-weight: 500;
            font-size: 1.1rem;
            margin: 0 0 1rem 0;
            line-height: 1.5;
        }

        .card-body {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            box-sizing: border-box;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--bg-color);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            transform: scale(0.95);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
            z-index: 10;
            transition: background 0.2s;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .modal-header-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 24px 24px 0 0;
        }

        .modal-body {
            padding: 3rem;
        }

        .modal-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 0 1rem 0;
            background: linear-gradient(135deg, #FFFFFF, #9CA3AF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-lead {
            font-size: 1.25rem;
            color: var(--text-main);
            margin-bottom: 2rem;
            font-weight: 500;
            line-height: 1.6;
        }

        .modal-text {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 3rem;
        }

        .modal-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--card-border);
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .info-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #6B7280;
            font-weight: 600;
        }

        .info-value {
            color: var(--text-main);
            font-weight: 500;
            word-break: break-all;
        }

        .info-value a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s;
        }

        .info-value a:hover {
            color: #60A5FA;
        }

        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 20vh;
            color: var(--text-secondary);
            font-size: 1.25rem;
            width: 100%;
            grid-column: 1 / -1;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(30px, 60px);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
                filter: blur(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-content {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Custom scrollbar for modal */
        .modal-content::-webkit-scrollbar {
            width: 10px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: var(--bg-color);
            border-radius: 0 24px 24px 0;
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            border: 3px solid var(--bg-color);
        }

        .modal-content::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>Global Nexus</h1>
            <div class="subtitle">Next-gen Information Portal</div>

            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="">日本語</button>
                <button class="lang-btn" data-lang="_en">English</button>
                <button class="lang-btn" data-lang="_tw">中文</button>
            </div>
        </header>

        <main class="grid" id="postGrid">
            <div class="loader">Loading dataset...</div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal">&times;</button>
            <div id="modalInner"></div>
        </div>
    </div>

    <script>
        let currentLangSuffix = ''; // '', '_en', '_tw'
        let postsData = [];

        const grid = document.getElementById('postGrid');
        const langBtns = document.querySelectorAll('.lang-btn');
        const modal = document.getElementById('detailModal');
        const closeModal = document.getElementById('closeModal');
        const modalInner = document.getElementById('modalInner');

        // Fetch Data
        async function fetchPosts() {
            try {
                const res = await fetch('/api/posts');
                if (!res.ok) throw new Error('Network error');
                postsData = await res.json();
                renderPosts();
            } catch (err) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #EF4444;">Failed to load data. API might be syncing.</div>`;
            }
        }

        // Helper to get localized value falling back to base (JP)
        function getLocContent(item, key) {
            return item[key + currentLangSuffix] || item[key] || '';
        }

        // Render Posts based on language
        function renderPosts() {
            if (postsData.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #9CA3AF;">No records found.</div>`;
                return;
            }

            grid.innerHTML = '';

            postsData.forEach((post, index) => {
                const title = getLocContent(post, 'title');
                const lead = getLocContent(post, 'lead_text');
                const body = getLocContent(post, 'body_text');

                const l1 = getLocContent(post, 'l1');
                const l2 = getLocContent(post, 'l2');
                const l3 = getLocContent(post, 'l3_label');

                const card = document.createElement('article');
                card.className = 'card fade-content';
                card.style.animationDelay = `${index * 0.05}s`;

                let badgesHtml = '';
                if (l1) badgesHtml += `<span class="badge l1">${escapeHtml(l1)}</span>`;
                if (l2) badgesHtml += `<span class="badge l2">${escapeHtml(l2)}</span>`;
                if (l3) badgesHtml += `<span class="badge l3">${escapeHtml(l3)}</span>`;

                card.innerHTML = `
                    <div class="card-img-wrapper">
                        ${post.image1 ? `<img src="${escapeHtml(post.image1)}" class="card-img" alt="Cover Image" loading="lazy">` : `<div class="card-img" style="display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.1);font-size:4rem;">✧</div>`}
                        <div class="card-badges">
                            ${badgesHtml}
                        </div>
                    </div>
                    <div class="card-content">
                        ${title ? `<h2 class="card-title">${escapeHtml(title)}</h2>` : ''}
                        ${lead ? `<div class="card-lead">${escapeHtml(lead)}</div>` : ''}
                        <p class="card-body">${escapeHtml(body)}</p>
                    </div>
                `;

                // Add click listener for modal
                card.addEventListener('click', () => openModal(post));
                grid.appendChild(card);
            });
        }

        function openModal(post) {
            const title = getLocContent(post, 'title');
            const lead = getLocContent(post, 'lead_text');
            const body = getLocContent(post, 'body_text');

            const l1 = getLocContent(post, 'l1');
            const l2 = getLocContent(post, 'l2');

            let infoGridHtml = '';

            const addInfo = (label, value, isLink = false) => {
                if (!value) return;
                infoGridHtml += `
                    <div class="info-item">
                        <span class="info-label">${escapeHtml(label)}</span>
                        <span class="info-value">${isLink ? `<a href="${escapeHtml(value)}" target="_blank" rel="noopener noreferrer">${escapeHtml(value)}</a>` : escapeHtml(value)}</span>
                    </div>
                `;
            };

            addInfo('Category', `${l1} ${l2 ? ' / ' + l2 : ''}`);
            addInfo('Homepage', post.homepage, true);
            addInfo('Address', post.address);
            addInfo('Fee', post.fee);
            addInfo('Date', [post.start_date, post.end_date].filter(Boolean).join(' - '));
            addInfo('Time', [post.start_time, post.end_time].filter(Boolean).join(' - '));

            modalInner.innerHTML = `
                ${post.image1 ? `<img src="${escapeHtml(post.image1)}" class="modal-header-img" alt="Header Image">` : ''}
                <div class="modal-body">
                    <h2 class="modal-title">${escapeHtml(title)}</h2>
                    ${lead ? `<div class="modal-lead">${escapeHtml(lead)}</div>` : ''}
                    <div class="modal-text">${escapeHtml(body).replace(/\\n/g, '<br>')}</div>
                    
                    ${infoGridHtml ? `<div class="modal-info-grid">${infoGridHtml}</div>` : ''}
                </div>
            `;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Language Switcher Logic
        langBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                langBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentLangSuffix = e.target.getAttribute('data-lang');

                grid.style.opacity = '0';
                setTimeout(() => {
                    renderPosts();
                    grid.style.opacity = '1';
                }, 300);
            });
        });

        closeModal.addEventListener('click', () => {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        });

        // Close modal on outside click
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        function escapeHtml(unsafe) {
            return (unsafe || "").toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Init
        fetchPosts();
    </script>
</body>

</html>
