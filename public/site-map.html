<body>

    <!-- 1. Slideshow -->
    <style>
        /* slideshow.jsの構造上、画像は2番目以降の要素として生成されるため、
         画像が1枚のみ（最後の子要素）の時はアニメーションを止めて強制表示します 
      */
        #lz-slideshow-app .lz-ss-item:nth-child(2):last-child {
            animation: none !important;
            opacity: 1 !important;
        }

        /* タイトルの文字間隔を少し広げて、よりデザイナーズ風の格を出します */
        #lz-slideshow-app .lz-ss-text {
            letter-spacing: 0.1em;
            text-transform: uppercase;
            /* 万が一の打ち間違いでも大文字を強制 */
        }
    </style>

    <div id="lz-slideshow-app" data-text-ja="サイトマップ" data-text-en="SITEMAP" data-text-zh="網站地圖"
        data-images='["https://cdn.peraichi.com/userData/cadd36d5-015f-4440-aa3c-b426c32c22a0/img/b0880b00-a041-013e-b187-0a58a9feac02/20231113_gold-19.jpg"]'>
    </div>


    <div class="p-hr--blank-space-medium" style="height: 40px;"></div>


    <!-- 2. Content: Sitemap Flow -->
    <style>
        /* 01. ? 余白異常と密度の徹底調整 */
        .lz-sm-wrap {
            padding: 0 24px 80px;
            background-color: #ffffff;
            font-family: var(--font-base, sans-serif);
            color: var(--ink-dark, #1b1b1b);
            line-height: 1.4;
            min-height: 80vh;
            /* ジャンプ防止用 */
        }

        .lz-sm-container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        /* L1ブロック間の余白を極限まで引き締め (40px -> 20px) */
        .lz-sm-section.lz-section {
            min-height: auto !important;
            /* 強制確保を解除 */
            margin: 0 0 20px 0 !important;
            padding: 0 !important;
            display: flex;
            flex-direction: column;
            gap: 12px;
            /* 見出しと中身の距離 */
        }

        .lz-sm-section:last-child {
            margin-bottom: 0 !important;
        }

        .lz-sm-l1-head {
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--apple-red, #cf3a3a);
            padding-bottom: 8px;
            border-bottom: 4px solid var(--apple-red);
            letter-spacing: 0.05em;
            width: fit-content;
            min-width: 300px;
        }

        /* 02. 中カテゴリ (L2) グリッド */
        .lz-sm-l2-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px 24px;
            align-items: start;
        }

        .lz-sm-l2-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .lz-sm-l2-title {
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--apple-brown);
            background: rgba(91, 58, 30, 0.06);
            padding: 8px 16px;
            border-radius: 6px;
            line-height: 1.2;
            border-left: 5px solid var(--apple-brown);
            margin-bottom: 4px;
        }

        /* 03. 記事タイトル：余白を最小化し密度を統一 */
        .lz-sm-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .lz-sm-list li {
            margin: 0;
        }

        .lz-sm-list a {
            font-size: 1.1rem;
            text-decoration: none;
            color: #555;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            /* パディングを統一 */
            border-radius: 4px;
            transition: color 0.2s;
            cursor: pointer;
        }

        .lz-sm-list a::before {
            content: "・";
            color: var(--apple-brown);
            opacity: 0.4;
            font-weight: 900;
        }

        .lz-sm-list a:hover {
            color: var(--apple-red, #cf3a3a);
            background: rgba(207, 58, 58, 0.03);
        }

        /* 04. L3プルダウン：通常タイトルと「1ピクセル違わず」揃える */
        .lz-sm-l3-details {
            margin: 0;
            border: none;
            background: transparent;
        }

        .lz-sm-l3-summary {
            padding: 4px 8px;
            /* aタグのpaddingと完全に一致 */
            font-size: 1.1rem;
            font-weight: 700;
            color: #777;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
            border-radius: 4px;
        }

        .lz-sm-l3-summary:hover {
            background: rgba(0, 0, 0, 0.03);
            color: #444;
        }

        .lz-sm-l3-summary::-webkit-details-marker {
            display: none;
        }

        .lz-sm-l3-summary::after {
            content: "＋";
            font-size: 0.8rem;
            opacity: 0.5;
        }

        .lz-sm-l3-details[open] .lz-sm-l3-summary::after {
            content: "ー";
        }

        .lz-sm-l3-content {
            padding: 0 0 4px 10px;
            border-left: 1px dashed #ddd;
            margin-left: 8px;
        }

        /* 05. りんご線画アニメーション */
        .lz-loading-box {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            color: #ccc;
            z-index: 10;
        }

        .lz-logo-svg {
            width: 100px;
            height: 100px;
            display: block;
            overflow: visible;
        }

        .lz-logo-path {
            fill: none;
            stroke: #ccc;
            stroke-width: 15;
            stroke-linecap: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: lz-draw 2.4s ease-in-out infinite alternate;
        }

        @keyframes lz-draw {
            from {
                stroke-dashoffset: 1000;
            }

            to {
                stroke-dashoffset: 0;
            }
        }

        /* 06. クイックビュー・モーダル (さらに一回り拡大版) */
        .qv-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 31000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            padding: 20px;
        }

        .qv-backdrop.is-open {
            display: flex;
            opacity: 1;
        }

        .qv-modal {
            background: #fff;
            width: 100%;
            max-width: 650px;
            border-radius: 20px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            transform: translateY(20px);
            transition: transform 0.3s;
        }

        .qv-backdrop.is-open .qv-modal {
            transform: translateY(0);
        }

        .qv-head {
            padding: 24px 28px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .qv-title {
            font-size: 1.9rem;
            font-weight: 800;
            color: var(--apple-brown);
            margin: 0;
            flex: 1;
            line-height: 1.3;
        }

        .qv-body {
            padding: 28px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .qv-lead {
            font-size: 1.45rem;
            font-weight: 700;
            color: #222;
            margin-bottom: 18px;
            line-height: 1.6;
            border-left: 5px solid var(--apple-red);
            padding-left: 14px;
        }

        .qv-text {
            font-size: 1.25rem;
            color: #555;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .qv-foot {
            padding: 24px 28px;
            background: #fafafa;
            display: flex;
            justify-content: flex-end;
            border-top: 1px solid #eee;
        }

        .qv-btn {
            background: var(--apple-red);
            color: #fff;
            text-decoration: none;
            padding: 14px 40px;
            border-radius: 99px;
            font-weight: 800;
            font-size: 1.25rem;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            outline: none;
        }

        .qv-btn:hover {
            background: var(--apple-red-strong, #a82626);
            color: #fff !important;
            transform: scale(1.05);
        }

        @media (max-width: 1200px) {
            .lz-sm-l2-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .lz-sm-l2-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .lz-sm-l2-grid {
                grid-template-columns: 1fr;
            }

            .lz-sm-wrap {
                padding: 20px;
            }
        }
    </style>

    <div class="qv-backdrop" id="qvBackdrop">
        <div class="qv-modal">
            <div class="qv-head">
                <h3 class="qv-title" id="qvTitle"></h3><button

    <script>
        (function () {
            "use strict";

            function forceUnlock() {
                document.documentElement.classList.remove('lz-loading-lock');
                var shield = document.getElementById('lzGlobalShield');
                if (shield) { shield.style.opacity = '0'; setTimeout(function () { shield.style.display = 'none'; }, 600); }
                if (window._lzSafetyFuse) clearTimeout(window._lzSafetyFuse);
                if (window._lzSitemapSafety) clearTimeout(window._lzSitemapSafety);
            }

            // ? クイックビュー制御（ナビゲーション強化版）
            let currentTargetUrl = "";
            const qv = {
                backdrop: document.getElementById('qvBackdrop'),
                title: document.getElementById('qvTitle'),
                lead: document.getElementById('qvLead'),
                text: document.getElementById('qvText'),
                btn: document.getElementById('qvBtn'),
                open: function (art, linkUrl) {
                    const C = window.LZ_COMMON, lang = window.LZ_CURRENT_LANG || 'ja';
                    currentTargetUrl = linkUrl; // 遷移先URLを保持
                    this.title.textContent = C.L(art, 'title');
                    const leadText = C.L(art, 'lead');
                    this.lead.textContent = leadText;
                    this.lead.style.display = leadText ? 'block' : 'none';
                    const limit = (lang === 'en') ? 140 : 50;
                    const bodyText = C.L(art, 'body');
                    this.text.textContent = bodyText ? (bodyText.length > limit ? bodyText.substring(0, limit) + '...' : bodyText) : '';
                    this.btn.textContent = C.T('詳しく見る');
                    this.backdrop.classList.add('is-open');
                    document.body.style.overflow = 'hidden';
                },
                hide: function () { this.backdrop.classList.remove('is-open'); document.body.style.overflow = ''; }
            };

            // ? 強制ナビゲーション関数
            window.lzSmNavigate = function () {
                if (currentTargetUrl) window.top.location.href = currentTargetUrl;
            };
            window.lzSmHideQv = () => qv.hide();
            qv.backdrop.onclick = (e) => { if (e.target === qv.backdrop) qv.hide(); };

            async function buildSitemap() {
                try {
                    if (!window.LZ_CONFIG || !window.LZ_COMMON) return setTimeout(buildSitemap, 100);
                    const C = window.LZ_COMMON, CONF = window.LZ_CONFIG, lang = window.LZ_CURRENT_LANG || 'ja';

                    const json = await C.NET.json(`${CONF.SEARCH_ENDPOINT}?q=%20&limit=1000`);
                    if (!json || !json.ok) throw new Error("Fetch Error");

                    const tree = {};
                    json.items.forEach(it => {
                        if (!it.l1 || !it.l2) return;
                        if (!tree[it.l1]) tree[it.l1] = {};
                        if (!tree[it.l1][it.l2]) tree[it.l1][it.l2] = {};
                        const l3Key = (it.l3 || "").trim() || "default";
                        if (!tree[it.l1][it.l2][l3Key]) tree[it.l1][it.l2][l3Key] = [];
                        tree[it.l1][it.l2][l3Key].push(it);
                    });

                    const grid = document.getElementById('lzSmGrid');
                    grid.innerHTML = CONF.MENU_ORDER.map(l1Key => {
                        const l2Map = tree[l1Key];
                        if (!l2Map || Object.keys(l2Map).length === 0) return "";
                        const l2Blocks = Object.keys(l2Map).map(l2Key => {
                            const l3Map = l2Map[l2Key];
                            const firstItemsObj = Object.values(l3Map)[0] || [];
                            const firstItem = firstItemsObj[0] || {};
                            const l2Label = C.L(firstItem, 'l2') || l2Key;

                            const itemsHtml = Object.keys(l3Map).map(l3Key => {
                                const articles = l3Map[l3Key] || [];
                                if (articles.length === 0) return "";
                                const listHtml = articles.map(art => {
                                    // HP出力.jsから取得した日本語タイトルをIDとして使用
                                    const titleStr = C.L(art, 'title') || "無題";
                                    const linkUrl = `${CONF.MENU_URL[l1Key] || ''}?lang=${lang}&id=${encodeURIComponent(art.title || '')}`;
                                    const artData = JSON.stringify(art).replace(/'/g, "&apos;");
                                    return `<li><a onclick='window.lzSmOpenQuickView(${artData}, "${linkUrl}")'>${C.esc(titleStr)}</a></li>`;
                                }).join('');

                                if (l3Key !== "default") {
                                    const l3Label = C.L(articles[0], 'l3') || l3Key;
                                    return `<details class="lz-sm-l3-details"><summary class="lz-sm-l3-summary">${C.esc(l3Label)}</summary><div class="lz-sm-l3-content"><ul class="lz-sm-list">${listHtml}</ul></div></details>`;
                                }
                                return `<ul class="lz-sm-list">${listHtml}</ul>`;
                            }).join('');
                            return `<div class="lz-sm-l2-group"><div class="lz-sm-l2-title">${C.esc(l2Label)}</div>${itemsHtml}</div>`;
                        }).join('');
                        return `<div class="lz-section lz-sm-section"><div class="lz-sm-l1-head">${C.T(l1Key)}</div><div class="lz-sm-l2-grid">${l2Blocks}</div></div>`;
                    }).join('');

                    window.lzSmOpenQuickView = (art, url) => qv.open(art, url);
                    document.getElementById('lzSmStatus').style.display = 'none';
                    grid.style.display = 'block';
                    forceUnlock();
                } catch (e) { console.error(e); forceUnlock(); }
            }
            window._lzSitemapSafety = setTimeout(forceUnlock, 5000);
            buildSitemap();
        })();
    </script>
