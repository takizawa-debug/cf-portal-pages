                        <script>
                            (function () {
                                var v = new Date().getTime();
                                var base = "/Form/"; // フォルダ名の大文字小文字に注意

                                var files = [
                                    base + "styles.js",
                                    base + "utils.js",
                                    base + "templates.js",
                                    base + "logic.js",
                                    base + "main.js"
                                ];

                                function loadModule(i) {
                                    if (i >= files.length) return;
                                    var url = files[i] + "?v=" + v;
                                    if (files[i].indexOf('main.js') !== -1) {
                                        var script = document.createElement('script');
                                        script.type = 'module';
                                        script.src = url;
                                        document.head.appendChild(script);
                                    } else {
                                        var link = document.createElement('link');
                                        link.rel = 'modulepreload';
                                        link.href = url;
                                        link.onload = function () { loadModule(i + 1); };
                                        link.onerror = function () { loadModule(i + 1); };
                                        document.head.appendChild(link);
                                    }
                                }
                                loadModule(0);
                            })();
                        </script>
                    </div>
                </div>
            </div>
        </div>
