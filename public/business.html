<!DOCTYPE html>
<html lang="ja" class="lz-loading-lock">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>【公式】りんごのまち・いいづな (テスト版)</title>
    <!-- Basic Meta Data -->
    <meta name="description" content="長野県飯綱町産のりんごポータルサイト。">

    <style>
        /* 画面読み込み時のちらつき防止 */
        html {
            background: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        body.is-ready {
            opacity: 1;
        }

        /* コンテナの幅設定 */
        .content-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }
    </style>

    <!-- UI Components Scripts (Copied from Old Design) -->
    <!-- 1. Config First -->
    <script src="/js/config.js"></script>
    <!-- 2. Common Utils -->
    <script src="/js/common.js"></script>

</head>

<body>

    <!-- 1. Slideshow -->
    <div id="lz-slideshow-app" data-text-ja="まごころ込めて\n「いいづなりんご」を届けよう"
        data-text-en="Delivering the Heart of Iizuna\nThrough Every Apple" data-text-zh="將滿載誠意的「飯綱蘋果」\n送到您的手中"
        data-images='[    "https://cdn.peraichi.com/userData/cadd36d5-015f-4440-aa3c-b426c32c22a0/img/b41733e0-8d6a-013e-bcf2-0a58a9feac02/sunfuji_kodama_1207-25.jpg",    "https://cdn.peraichi.com/userData/cadd36d5-015f-4440-aa3c-b426c32c22a0/img/8b029720-8d6a-013e-bcd5-0a58a9feac02/IMG_3168%E5%90%88%E6%88%90.jpg",    "https://cdn.peraichi.com/userData/cadd36d5-015f-4440-aa3c-b426c32c22a0/img/6e304930-8d6a-013e-bcc2-0a58a9feac02/apple-sensor_2023-4.jpg",    "https://cdn.peraichi.com/userData/cadd36d5-015f-4440-aa3c-b426c32c22a0/img/51230d30-8d6a-013e-aeb6-0a58a9feac02/20240112_mitsudon-2.jpg",    "https://cdn.peraichi.com/userData/cadd36d5-015f-4440-aa3c-b426c32c22a0/img/27b036d0-8d6a-013e-ae7b-0a58a9feac02/20230915_tsugaru-14.jpg"  ]'>
    </div>

    <!-- Main Content Flow -->
    <div style="padding-top: 60px; padding-bottom: 60px;">

        <!-- 2. Section: 栽培支援 -->
        <div class="content-wrap" style="margin-bottom: 50px;">
            <div class="lz-section" data-l1="営む" data-l2="栽培支援" data-card-width="33.33%" data-card-width-sm="80%"
                data-image-ratio="16:9" data-autoplay="false"></div>
        </div>

        <!-- 3. Section: 出荷・加工施設 -->
        <div class="content-wrap" style="margin-bottom: 50px;">
            <div class="lz-section" data-l1="営む" data-l2="出荷・加工施設" data-card-width="33.33%" data-card-width-sm="80%"
                data-image-ratio="16:9" data-autoplay="false"></div>
        </div>

        <!-- 4. Section: 販促素材 -->
        <div class="content-wrap" style="margin-bottom: 50px;">
            <div class="lz-section" data-l1="営む" data-l2="販促素材" data-card-width="33.33%" data-card-width-sm="80%"
                data-image-ratio="16:9" data-autoplay="false"></div>
        </div>

    </div>


    <!-- Base UI Components -->
    <script src="/js/slideshow.js"></script>
    <script src="/js/intro-block.js"></script>
    <script src="/js/section.js"></script>
    <script src="/js/modal.js"></script>

    <!-- Header & Footer Components -->
    <!-- These will automatically inject their own HTML to the body based on config.js paths -->
    <script src="/js/header.js"></script>
    <script src="/js/footer.js"></script>

    <script>
        // Reveal body after scripts initialized
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.body.classList.add('is-ready');
            }, 500);
        });
    </script>
</body>

</html>
