<!DOCTYPE html>
<html lang="ja" class="lz-loading-lock">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>【公式】りんごのまち・いいづな (テスト版)</title>
    <!-- Basic Meta Data -->
    <meta name="description" content="長野県飯綱町産のりんごポータルサイト。">

    <style>
        /* 画面読み込み時のちらつき防止 */
        html {
            background: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        body.is-ready {
            opacity: 1;
        }

        /* コンテナの幅設定 */
        .content-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }
    </style>

    <!-- UI Components Scripts (Copied from Old Design) -->
    <!-- 1. Config First -->
    <script src="/js/config.js"></script>
    <!-- 2. Common Utils -->
    <script src="/js/common.js"></script>

</head>

<body>



    <!-- 3. Dynamic Sections -->
    <div class="content-wrap" style="margin-top: 60px; margin-bottom: 60px;">
        <!-- Discover (知る) -->
        <h2 style="text-align: center; color: #cf3a3a; font-size: 2rem; margin-bottom: 40px;" data-i18n="知る">知る</h2>
        <div class="lz-section" data-l1="知る"></div>
    </div>


    <!-- Base UI Components -->
    <script src="/js/slideshow.js"></script>
    <script src="/js/intro-block.js"></script>
    <script src="/js/section.js"></script>
    <script src="/js/modal.js"></script>

    <!-- Header & Footer Components -->
    <!-- These will automatically inject their own HTML to the body based on config.js paths -->
    <script src="/js/header.js"></script>
    <script src="/js/footer.js"></script>

    <script>
        // Reveal body after scripts initialized
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.body.classList.add('is-ready');
            }, 500);
        });
    </script>
</body>

</html>
