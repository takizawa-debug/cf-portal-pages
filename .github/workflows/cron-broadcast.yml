name: Broadcast Schedule Cron

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual triggering for testing

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CF Pages Broadcast API
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -f -s -S "https://cf-portal-pages.pages.dev/api/cron/broadcast?token=${CRON_SECRET:-iizuna-cron-token-123}"
